name: browser-tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/browser-tests.yml'
      - 'app/**'
      - 'bootstrap/**'
      - 'composer.json'
      - 'composer.lock'
      - 'config/**'
      - 'database/**'
      - 'package.json'
      - 'package-lock.json'
      - 'resources/js/**'
      - 'routes/**'
      - 'tests/Browser/**'
      - 'vite.config.ts'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/browser-tests.yml'
      - 'app/**'
      - 'bootstrap/**'
      - 'composer.json'
      - 'composer.lock'
      - 'config/**'
      - 'database/**'
      - 'package.json'
      - 'package-lock.json'
      - 'resources/js/**'
      - 'routes/**'
      - 'tests/Browser/**'
      - 'vite.config.ts'
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Create SQLite Database
        run: touch testing

      - name: Build Assets
        run: npm run build

      - name: Markdown Browser Tests
        run: ./vendor/bin/pest --ci tests/Browser/ZennMarkdownRenderingTest.php tests/Browser/MintlifyTabsRenderingTest.php tests/Browser/CodeBlockHighlightingTest.php tests/Browser/MarkdownEditorHeadingJumpTest.php
