name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Build Assets
        run: npm run build

      - name: Type Check
        run: npm run types:check

      - name: Markdown Syntax Tests
        run: npm run markdown:test

  ssr-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Create SQLite Database
        run: mkdir -p database && touch database/database.sqlite

      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        run: php artisan migrate --force --no-interaction

      - name: Seed SSR Smoke Content
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        run: |
          php artisan tinker --execute 'use App\Models\Post; use App\Models\PostNamespace; $namespace = PostNamespace::factory()->create(["slug" => "ssr-guides", "name" => "SSR Guides", "is_published" => true]); Post::factory()->for($namespace, "namespace")->published()->create(["slug" => "smoke-test", "title" => "SSR Smoke Test", "content" => "# SSR Smoke Test\n\nRendered through the SSR smoke workflow."]);'

      - name: Build SSR Assets
        run: npm run build:ssr

      - name: Start SSR and App Servers
        env:
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        run: |
          php artisan inertia:start-ssr > /tmp/inertia-ssr.log 2>&1 &
          echo $! > /tmp/inertia-ssr.pid
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel-serve.log 2>&1 &
          echo $! > /tmp/laravel-serve.pid

      - name: Wait for App Server
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:8000/ > /tmp/ssr-home.html; then
              break
            fi
            sleep 1
          done
          if ! test -s /tmp/ssr-home.html; then
            cat /tmp/laravel-serve.log
            exit 1
          fi

      - name: Wait for SSR Server
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:13714/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/inertia-ssr.log
          exit 1

      - name: Assert SSR Smoke Pages Render
        run: |
          kill -0 "$(cat /tmp/inertia-ssr.pid)"
          curl --silent --fail http://127.0.0.1:8000/ > /tmp/ssr-home.html
          curl --silent --fail http://127.0.0.1:8000/ssr-guides/smoke-test > /tmp/ssr-post.html
          grep -q 'ThinkStream' /tmp/ssr-home.html
          grep -q 'SSR Smoke Test' /tmp/ssr-post.html

      - name: Dump SSR Logs on Failure
        if: failure()
        run: |
          echo '--- inertia-ssr.log ---'
          cat /tmp/inertia-ssr.log || true
          echo '--- laravel-serve.log ---'
          cat /tmp/laravel-serve.log || true

  php-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Create SQLite Database
        run: touch testing

      - name: Build Assets
        run: npm run build

      - name: Feature and Unit Tests
        run: ./vendor/bin/pest --ci tests/Feature tests/Unit
