name: fresh-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fresh-build.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'resources/js/**'
      - 'tsconfig.json'
      - 'vite.config.ts'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Wayfinder Types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Build frontend assets
        run: npm run build

      - name: Type Check frontend
        run: npm run types:check
